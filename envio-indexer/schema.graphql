# Entities consumed by the front-end. Field names mirror src/lib/api.ts
# (LEADERBOARD_QUERY, WALLET_DETAIL_QUERY) and DiagnosticsPanel probes.

type Wallet @entity {
  id: ID!                         # lowercased wallet address
  address: String!
  role: String!                   # SCOUT | EXECUTOR | VERIFIER  (set by handler heuristic)
  reputation: BigInt!
  jobsCompleted: BigInt!
  volumeUsdc: BigInt!
  autonomyScore: Int!             # 0..100
  activatedAt: BigInt!            # unix seconds
  identityId: BigInt
  identityUri: String
  controller: String
  skills: [SkillInstall!]! @derivedFrom(field: "wallet")
  executions: [Execution!]! @derivedFrom(field: "wallet")
  jobsPosted: [Job!]! @derivedFrom(field: "client")
  jobsExecuted: [Job!]! @derivedFrom(field: "executor")
  reputationRecords: [ReputationRecord!]! @derivedFrom(field: "wallet")
  validationRequests: [ValidationRequest!]! @derivedFrom(field: "wallet")
}

type AgentIdentity @entity {
  id: ID!                         # numeric agent identity id
  wallet: Wallet!
  controller: String!
  uri: String!
  registeredAt: BigInt!
  updatedAt: BigInt!
}

type Skill @entity {
  id: ID!                         # bytes32 skill id (hex)
  name: String!
  uri: String!
  author: Wallet!
  publishedAt: BigInt!
  installs: BigInt!
  fires: BigInt!
}

type SkillInstall @entity {
  id: ID!                         # `${skillId}-${wallet}`
  wallet: Wallet!
  skill: Skill!
  name: String!                   # denormalised for fast leaderboard query
  status: String!                 # active | paused
  fires: BigInt!
  installedAt: BigInt!
}

type Execution @entity {
  id: ID!                         # `${tx}-${logIdx}`
  wallet: Wallet!
  timestamp: BigInt!
  action: String!                 # SKILL_FIRE | JOB_ACCEPT | JOB_COMPLETE | IDENTITY | …
  detail: String!
  txHash: String!
  color: String!                  # yellow|cyan|green|orange|red|purple
}

type Job @entity {
  id: ID!                         # numeric job id
  client: Wallet!
  executor: Wallet
  budget: BigInt!
  paid: BigInt!
  status: String!                 # OPEN|ACCEPTED|SUBMITTED|COMPLETED|CANCELLED
  spec: String!
  resultHash: String
  postedAt: BigInt!
  completedAt: BigInt
}

type ReputationRecord @entity {
  id: ID!                         # numeric reputation record id
  wallet: Wallet!
  issuer: String!
  value: BigInt!
  decimals: Int!
  scoreAfter: BigInt!
  tag1: String!
  tag2: String!
  uri: String!
  fileHash: String!
  recordedAt: BigInt!
  txHash: String!
}

type ValidationRequest @entity {
  id: ID!                         # requestHash
  wallet: Wallet
  validator: String!
  agentId: BigInt!
  requestURI: String!
  requestHash: String!
  requestedAt: BigInt!
  response: ValidationResponse
}

type ValidationResponse @entity {
  id: ID!                         # requestHash
  request: ValidationRequest!
  validator: String!
  agentId: BigInt!
  response: Int!
  responseURI: String!
  responseHash: String!
  tag: String!
  respondedAt: BigInt!
  txHash: String!
}

type EconomyStat @entity {
  id: ID!                         # singleton "global"
  activeWallets: Int!
  jobsToday: Int!
  usdcSettled: BigInt!
  avgDecisionMs: Int!
  updatedAt: BigInt!
}
